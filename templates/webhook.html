<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📩 Webhook Monitor — Livestream Radar</title>
    <meta name="description" content="Realtime Pancake webhook event monitor">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e1a;
            --surface: rgba(255, 255, 255, 0.04);
            --surface-hover: rgba(255, 255, 255, 0.07);
            --border: rgba(255, 255, 255, 0.08);
            --text: #e2e8f0;
            --text-dim: #64748b;
            --accent: #818cf8;
            --order: #4ade80;
            --message: #60a5fa;
            --tag: #a78bfa;
            --customer: #fbbf24;
            --unknown: #f87171;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── Header ──────────────────────────── */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 12px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-sub {
            font-size: 12px;
            color: var(--text-dim);
        }

        .back-link {
            font-size: 13px;
            color: var(--accent);
            text-decoration: none;
            padding: 6px 14px;
            border: 1px solid rgba(129, 140, 248, 0.3);
            border-radius: 8px;
            transition: all 0.2s;
        }

        .back-link:hover {
            background: rgba(129, 140, 248, 0.1);
        }

        /* ── Stats Bar ──────────────────────── */
        .stats-bar {
            display: flex;
            gap: 12px;
            padding: 16px 24px;
            flex-wrap: wrap;
        }

        .stat-card {
            flex: 1;
            min-width: 140px;
            padding: 14px 18px;
            border-radius: 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .stat-card:hover {
            background: var(--surface-hover);
            transform: translateY(-1px);
        }

        .stat-card.active {
            border-color: var(--accent);
            background: rgba(129, 140, 248, 0.08);
        }

        .stat-num {
            font-size: 28px;
            font-weight: 700;
        }

        .stat-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-dim);
            margin-top: 4px;
        }

        .stat-card[data-cat="all"] .stat-num {
            color: var(--accent);
        }

        .stat-card[data-cat="order"] .stat-num {
            color: var(--order);
        }

        .stat-card[data-cat="message"] .stat-num {
            color: var(--message);
        }

        .stat-card[data-cat="tag"] .stat-num {
            color: var(--tag);
        }

        .stat-card[data-cat="customer"] .stat-num {
            color: var(--customer);
        }

        .stat-card[data-cat="unknown"] .stat-num {
            color: var(--unknown);
        }

        /* ── Filter buttons ──────────────────── */
        .filter-bar {
            display: flex;
            gap: 8px;
            padding: 0 24px 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-btn {
            font-size: 12px;
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-dim);
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .filter-btn:hover {
            background: var(--surface-hover);
            color: var(--text);
        }

        .filter-btn.active {
            background: rgba(129, 140, 248, 0.15);
            color: var(--accent);
            border-color: var(--accent);
        }

        .refresh-btn {
            margin-left: auto;
            font-size: 12px;
            padding: 6px 16px;
            border-radius: 8px;
            border: 1px solid rgba(129, 140, 248, 0.3);
            background: transparent;
            color: var(--accent);
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }

        .refresh-btn:hover {
            background: rgba(129, 140, 248, 0.1);
        }

        /* ── Event List ──────────────────────── */
        .event-list {
            padding: 0 24px 24px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .event-card {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 14px 18px;
            border-radius: 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            transition: all 0.2s;
            cursor: pointer;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .event-card:hover {
            background: var(--surface-hover);
        }

        .event-card.expanded {
            border-color: var(--accent);
        }

        .event-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .event-icon.order {
            background: rgba(74, 222, 128, 0.12);
        }

        .event-icon.message {
            background: rgba(96, 165, 250, 0.12);
        }

        .event-icon.tag {
            background: rgba(167, 139, 250, 0.12);
        }

        .event-icon.customer {
            background: rgba(251, 191, 36, 0.12);
        }

        .event-icon.unknown {
            background: rgba(248, 113, 113, 0.12);
        }

        .event-body {
            flex: 1;
            min-width: 0;
        }

        .event-summary {
            font-size: 13px;
            font-weight: 500;
            line-height: 1.4;
            word-break: break-word;
        }

        .event-meta {
            display: flex;
            gap: 10px;
            margin-top: 4px;
            font-size: 11px;
            color: var(--text-dim);
        }

        .event-type-badge {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-dim);
            font-family: monospace;
        }

        .event-payload {
            display: none;
            margin-top: 10px;
            padding: 12px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
            font-size: 11px;
            font-family: 'Courier New', monospace;
            color: #94a3b8;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 300px;
            overflow-y: auto;
        }

        .event-card.expanded .event-payload {
            display: block;
        }

        .event-time {
            font-size: 11px;
            color: var(--text-dim);
            white-space: nowrap;
            flex-shrink: 0;
            padding-top: 2px;
        }

        /* ── Empty state ──────────────────────── */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-dim);
        }

        .empty-state span {
            font-size: 48px;
            display: block;
            margin-bottom: 12px;
        }

        .empty-state p {
            font-size: 14px;
        }

        /* ── Loading spinner ─────────────────── */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-dim);
            font-size: 14px;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid var(--accent);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── Auto-refresh indicator ───────────── */
        .auto-refresh {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: var(--text-dim);
        }

        .pulse-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--order);
            animation: pulse 2s ease infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }
    </style>
</head>

<body>
    <input type="hidden" id="radar-api-key" value="{{ radar_api_key }}">

    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <span style="font-size:28px">📩</span>
            <div>
                <h1>Webhook Monitor</h1>
                <span class="header-sub">Pancake Real-time Events</span>
            </div>
        </div>
        <div style="display:flex; align-items:center; gap:12px;">
            <div class="auto-refresh">
                <span class="pulse-dot"></span>
                Auto-refresh: <span id="countdown">30</span>s
            </div>
            <a href="/" class="back-link">← Dashboard</a>
        </div>
    </div>

    <!-- Stats -->
    <div class="stats-bar">
        <div class="stat-card active" data-cat="all" onclick="filterCategory('all')">
            <div class="stat-num" id="stat-total">0</div>
            <div class="stat-label">Tổng Events</div>
        </div>
        <div class="stat-card" data-cat="order" onclick="filterCategory('order')">
            <div class="stat-num" id="stat-order">0</div>
            <div class="stat-label">📦 Đơn Hàng</div>
        </div>
        <div class="stat-card" data-cat="message" onclick="filterCategory('message')">
            <div class="stat-num" id="stat-message">0</div>
            <div class="stat-label">💬 Tin Nhắn</div>
        </div>
        <div class="stat-card" data-cat="tag" onclick="filterCategory('tag')">
            <div class="stat-num" id="stat-tag">0</div>
            <div class="stat-label">🏷️ Gắn Thẻ</div>
        </div>
        <div class="stat-card" data-cat="customer" onclick="filterCategory('customer')">
            <div class="stat-num" id="stat-customer">0</div>
            <div class="stat-label">👤 Khách Hàng</div>
        </div>
        <div class="stat-card" data-cat="unknown" onclick="filterCategory('unknown')">
            <div class="stat-num" id="stat-unknown">0</div>
            <div class="stat-label">❓ Khác</div>
        </div>
    </div>

    <!-- Filter -->
    <div class="filter-bar">
        <button class="filter-btn active" data-cat="all" onclick="filterCategory('all')">Tất cả</button>
        <button class="filter-btn" data-cat="order" onclick="filterCategory('order')">📦 Đơn hàng</button>
        <button class="filter-btn" data-cat="message" onclick="filterCategory('message')">💬 Tin nhắn</button>
        <button class="filter-btn" data-cat="tag" onclick="filterCategory('tag')">🏷️ Gắn thẻ</button>
        <button class="filter-btn" data-cat="customer" onclick="filterCategory('customer')">👤 Khách hàng</button>
        <button class="filter-btn" data-cat="unknown" onclick="filterCategory('unknown')">❓ Khác</button>
        <button class="refresh-btn" onclick="loadEvents()">🔄 Refresh</button>
    </div>

    <!-- Event List -->
    <div id="event-list" class="event-list">
        <div class="loading">Đang tải webhook events</div>
    </div>

    <script>
        const API_KEY = document.getElementById('radar-api-key').value;
        let currentCat = 'all';
        let refreshTimer = null;
        let countdownTimer = null;
        let countdownVal = 30;

        const ICONS = {
            order: '📦', message: '💬', tag: '🏷️', customer: '👤', unknown: '❓',
        };

        function authFetch(url) {
            return fetch(url, { headers: { 'X-API-Key': API_KEY } });
        }

        function escHtml(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        function fmtTime(ts) {
            if (!ts) return '';
            const d = new Date(ts);
            return d.toLocaleString('vi-VN', {
                hour: '2-digit', minute: '2-digit', second: '2-digit',
                day: '2-digit', month: '2-digit',
            });
        }

        function renderEvent(ev) {
            const icon = ICONS[ev.category] || '❓';
            const card = document.createElement('div');
            card.className = 'event-card';
            card.onclick = function () { this.classList.toggle('expanded'); };

            let payloadStr = '';
            try {
                const obj = typeof ev.payload === 'string' ? JSON.parse(ev.payload) : ev.payload;
                payloadStr = JSON.stringify(obj, null, 2);
            } catch { payloadStr = ev.payload || '{}'; }

            card.innerHTML = `
        <div class="event-icon ${ev.category}">${icon}</div>
        <div class="event-body">
          <div class="event-summary">${escHtml(ev.summary || '')}</div>
          <div class="event-meta">
            <span class="event-type-badge">${escHtml(ev.event_type || '')}</span>
            <span>${fmtTime(ev.created_at)}</span>
          </div>
          <div class="event-payload">${escHtml(payloadStr)}</div>
        </div>
        <span class="event-time">${fmtTime(ev.created_at)}</span>
      `;
            return card;
        }

        async function loadEvents() {
            const list = document.getElementById('event-list');
            const catParam = currentCat === 'all' ? '' : `&category=${currentCat}`;

            try {
                const r = await authFetch(`/api/webhook-events?limit=200${catParam}`);
                const d = await r.json();

                if (d.status === 'ok') {
                    // Update stats
                    const stats = d.stats || {};
                    document.getElementById('stat-total').textContent = stats.total || 0;
                    document.getElementById('stat-order').textContent = stats.order || 0;
                    document.getElementById('stat-message').textContent = stats.message || 0;
                    document.getElementById('stat-tag').textContent = stats.tag || 0;
                    document.getElementById('stat-customer').textContent = stats.customer || 0;
                    document.getElementById('stat-unknown').textContent = stats.unknown || 0;

                    // Render events
                    list.innerHTML = '';
                    if (!d.events || d.events.length === 0) {
                        list.innerHTML = `
              <div class="empty-state">
                <span>📭</span>
                <p>Chưa có webhook event nào${currentCat !== 'all' ? ' trong nhóm này' : ''}.</p>
                <p style="margin-top:8px; font-size:12px; color:#475569;">
                  Webhook URL: <code style="background:rgba(255,255,255,0.06); padding:2px 6px; border-radius:4px;">https://radar.kiwibebe.shop/webhook/pancake</code>
                </p>
              </div>`;
                        return;
                    }

                    d.events.forEach(ev => {
                        list.appendChild(renderEvent(ev));
                    });
                }
            } catch (e) {
                list.innerHTML = `<div class="empty-state"><span>⚠️</span><p>Lỗi tải dữ liệu: ${escHtml(e.message)}</p></div>`;
            }

            // Reset countdown
            resetCountdown();
        }

        function filterCategory(cat) {
            currentCat = cat;
            // Update active states
            document.querySelectorAll('.stat-card').forEach(c => c.classList.toggle('active', c.dataset.cat === cat));
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
            loadEvents();
        }

        function resetCountdown() {
            countdownVal = 30;
            document.getElementById('countdown').textContent = countdownVal;
            if (countdownTimer) clearInterval(countdownTimer);
            countdownTimer = setInterval(() => {
                countdownVal--;
                document.getElementById('countdown').textContent = countdownVal;
                if (countdownVal <= 0) {
                    loadEvents();
                }
            }, 1000);
        }

        // Initial load
        loadEvents();
    </script>
</body>

</html>
